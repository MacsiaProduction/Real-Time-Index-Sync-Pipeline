# PostgreSQL / Flink CDC
pg.host=localhost
pg.port=5432
pg.database=pipeline
pg.username=pipeline
pg.password=pipeline
pg.schema.list=public
pg.table.list=public.products

# Kafka
kafka.bootstrap.servers=localhost:9092
kafka.topic.prices=prices
kafka.topic.stock=stock
kafka.topic.dlq=dlq
kafka.group.id=rt-index-pipeline

# Elasticsearch
es.host=localhost
es.port=9200
es.index.name=products

# Pipeline tuning
checkpoint.interval.ms=60000
state.ttl.hours=24
es.bulk.flush.max.actions=500
es.bulk.flush.interval.ms=1000
